    <title>StakeWise - Gestão de Apostas</title>
    <script>
      // Global fix for fetch getter-only error in certain environments
      (function() {
        var protect = function(obj) {
          try {
            var f = obj.fetch;
            if (f && typeof f === 'function') {
              Object.defineProperty(obj, 'fetch', {
                configurable: true,
                enumerable: true,
                get: function() { return f; },
                set: function(v) { console.warn('Fetch overwrite ignored on', obj === window ? 'window' : 'self'); }
              });
            }
          } catch (e) {}
        };
        protect(window);
        if (typeof self !== 'undefined') protect(self);
      })();
    </script>
