<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="StakeWise" />
    <meta name="theme-color" content="#121214" />
    <link rel="apple-touch-icon" href="https://ui-avatars.com/api/?name=S+W&background=0A0B0E&color=00FF95&size=180&bold=true&font-size=0.4" />
    <link rel="manifest" href="/manifest.json?v=1.4.5" />
    <title>StakeWise - Gestão de Apostas</title>
    <script>
      // Fix for "TypeError: Cannot set property fetch of #<Window> which has only a getter"
      // This happens when a library tries to rewrite window.fetch in restricted environments.
      (function() {
        try {
          var descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && !descriptor.set && descriptor.configurable) {
            var originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: function() { return originalFetch; },
              set: function(v) { console.warn('Blocked assignment to fetch, using original.'); }
            });
          }
        } catch (e) {
          console.error('Fetch protection failed:', e);
        }
      })();

      // Clear all service workers to fix "Unexpected token <" caused by stale PWA cache
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
            console.log('ServiceWorker unregistered');
          }
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
